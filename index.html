<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors (WASM)</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^3.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="text-center">
        <h1 class="text-4xl font-bold mb-6">Rock Paper Scissors</h1>
        <div id="choices" class="space-x-4 mb-6">
            <button data-choice="0" class="px-6 py-3 bg-blue-500 text-white rounded hover:bg-blue-600">Rock</button>
            <button data-choice="1" class="px-6 py-3 bg-green-500 text-white rounded hover:bg-green-600">Paper</button>
            <button data-choice="2" class="px-6 py-3 bg-red-500 text-white rounded hover:bg-red-600">Scissors</button>
        </div>
        <div id="result" class="text-xl"></div>
    </div>

    <!-- Emscripten output -->
    <script src="rockpaperscissors.js"></script>
    <script src="game.js"></script>
</body>
</html>
