<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors (WASM)</title>
    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@^3.0/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-400 via-pink-500 to-red-500 flex items-center justify-center h-screen">
    <div class="text-center p-8 bg-white bg-opacity-80 rounded-lg shadow-lg">
        <h1 class="text-5xl font-extrabold mb-8 text-gradient bg-clip-text text-transparent bg-gradient-to-r from-yellow-300 via-orange-400 to-red-500">Rock Paper Scissors</h1>
        <div id="choices" class="space-x-4 mb-8">
            <button data-choice="0" class="px-8 py-4 bg-blue-400 text-white font-semibold rounded-full shadow hover:bg-blue-500 transform hover:scale-105 transition">Rock</button>
            <button data-choice="1" class="px-8 py-4 bg-green-400 text-white font-semibold rounded-full shadow hover:bg-green-500 transform hover:scale-105 transition">Paper</button>
            <button data-choice="2" class="px-8 py-4 bg-red-400 text-white font-semibold rounded-full shadow hover:bg-red-500 transform hover:scale-105 transition">Scissors</button>
        </div>
        <div id="result" class="text-2xl font-medium text-gray-800"></div>
    </div>

    <!-- Emscripten output -->
    <script src="rockpaperscissors.js"></script>
    <script src="game.js"></script>
</body>
</html>
